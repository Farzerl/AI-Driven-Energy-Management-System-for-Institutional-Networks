<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 720"><defs><style>.b{fill:#fff;stroke:#0b6b61;stroke-width:2}.h{font:700 20px Segoe UI,Arial;fill:#14222b}.t{font:14px Segoe UI,Arial;fill:#42545e}.a{stroke:#55737e;stroke-width:2.5;fill:none;marker-end:url(#m)}.s{fill:#e8f4f2;stroke:#0b6b61;stroke-width:2}</style><marker id="m" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto"><path d="M0 0L10 5L0 10z" fill="#55737e"/></marker></defs><rect width="1180" height="720" fill="#f7fafb"/><text class="h" x="40" y="45">AI4I Institutional EMS: integrated hardware-software architecture</text><rect class="b" x="35" y="90" width="210" height="120" rx="14"/><text class="h" x="60" y="125">Meter layer</text><text class="t" x="60" y="155">Existing smart meters</text><text class="t" x="60" y="178">Optional submeters and CTs</text><rect class="b" x="285" y="90" width="210" height="120" rx="14"/><text class="h" x="310" y="125">Edge gateway</text><text class="t" x="310" y="155">Protocol or file/API adapter</text><text class="t" x="310" y="178">Validation and local buffer</text><rect class="b" x="535" y="90" width="210" height="120" rx="14"/><text class="h" x="560" y="125">Data services</text><text class="t" x="560" y="155">Cleaned operational store</text><text class="t" x="560" y="178">Quality flags and features</text><rect class="b" x="785" y="90" width="210" height="120" rx="14"/><text class="h" x="810" y="125">AI and rules</text><text class="t" x="810" y="155">Demand forecast and peak risk</text><text class="t" x="810" y="178">Safety and tariff logic</text><rect class="b" x="1035" y="90" width="110" height="120" rx="14"/><text class="h" x="1050" y="125">API</text><text class="t" x="1050" y="155">Alerts</text><text class="t" x="1050" y="178">Decisions</text><path class="a" d="M245 150H285"/><path class="a" d="M495 150H535"/><path class="a" d="M745 150H785"/><path class="a" d="M995 150H1035"/><rect class="b" x="120" y="315" width="290" height="130" rx="14"/><text class="h" x="150" y="352">UZ institutional host</text><text class="t" x="150" y="382">API, dashboard, data and logs</text><text class="t" x="150" y="407">TLS, roles, backup and monitoring</text><rect class="b" x="445" y="315" width="290" height="130" rx="14"/><text class="h" x="475" y="352">Estates and Facilities</text><text class="t" x="475" y="382">Review and confirm actions</text><text class="t" x="475" y="407">Feedback and audit trail</text><rect class="b" x="770" y="315" width="290" height="130" rx="14"/><text class="h" x="800" y="352">ZCHPC support pathway</text><text class="t" x="800" y="382">Retraining, backup and recovery</text><text class="t" x="800" y="407">Subject to institutional approval</text><path class="a" d="M1090 210V270H265V315"/><path class="a" d="M410 380H445"/><path class="a" d="M735 380H770"/><rect class="s" x="175" y="530" width="830" height="100" rx="14"/><text class="h" x="205" y="565">Future supervised control interface</text><text class="t" x="205" y="592">Approved non-critical loads only, with protection review, interlocks, manual override, fail-safe testing and rollback.</text><path class="a" d="M590 445V530"/><rect x="160" y="655" width="860" height="42" rx="12" fill="#fff" stroke="#6f8189"/><text class="t" x="190" y="682">Current MVP boundary: advisory and operator-confirmed. Autonomous electrical switching is disabled.</text></svg>